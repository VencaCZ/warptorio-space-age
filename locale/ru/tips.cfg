[tips-and-tricks-item-description]
warptorio=Warptorio (Space Age).
; warptorio-warp-trains=Trains can be warped between the [font=default-bold]ground[/font] and the [font=default-bold]factory floor[/font] using special train stations.\n\nTo warp a train, it must be [color=yellow]fully stopped[/color] at a station named:\n • [color=orange]WarpGround[/color] (If you want to go to ground floor from the factory)\n • [color=orange]WarpFactory[/color] (If you want to go to factory floor from the ground floor)\n\n[color=red][font=default-bold]Important:[/font][/color]\nBoth stations must have the [color=red]same orientation[/color] (north, south, east, or west).\n\nIf the station names match but the orientations do not, the train will [font=default-bold]not warp[/font].\nTrain will also [font=default-bold]not warp[/font] if it is in manual more or when there is someone inside.\n\n[color=green]Tip:[/color] Copy or blueprint the station to ensure the orientation matches on both floors.If you want to have multiple train stops per cardinal direction disable all stations except one to ensure that train will go to that station.
warptorio-warp-trains=Поезда можно перемещать между [font=default-bold]наземной[/font] и [font=default-bold]заводской платформами[/font] с помощью специальных железнодорожных станций.\n\nЧтобы переместить поезд, он должен [color=yellow]полностью остановиться[/color] на станции с именем:\n • [color=orange]WarpGround[/color] (если вы хотите попасть на наземную платформу из заводской)\n • [color=orange]WarpFactory[/color] (если вы хотите попасть на заводскую платформу с наземной)\n\n[color=red][font=default-bold]Важно:[/font][/color]\nОбе станции должны иметь [color=red]одинаковую ориентацию[/color] (север, юг, восток или запад).\n\nЕсли названия станций совпадают, а ориентация отличается, поезд [font=default-bold]не переместится[/font].\nПоезд также [font=default-bold]не переместится[/font], если он находится в ручном управлении или если внутри есть пассажир.\n\n[color=green]Совет:[/color] Скопируйте станцию или используйте чертёж, чтобы ориентация совпадала на обоих уровнях. Если вы хотите иметь несколько станций для одного направления, отключите все, кроме одной, чтобы поезд гарантированно прибыл на нужную станцию.

; warptorio-evolution-scaling=Enemy evolution in Warptorio is [font=default-bold]not based on time or pollution[/font]. It is scaled by your progress through key platform researches.\n\nEach unlocked milestone research raises the enemy evolution to a fixed value:\n • [technology=warp-ground-platform-4] -> [color=orange]10%[/color]\n • [technology=warp-factory-platform-3] -> [color=orange]15%[/color]\n • [technology=warp-ground-platform-5] -> [color=orange]20%[/color]\n • [technology=warp-factory-platform-4] -> [color=orange]30%[/color]\n • [technology=warp-ground-platform-6] -> [color=orange]40%[/color]\n • [technology=warp-factory-platform-5] -> [color=orange]50%[/color]\n • [technology=warp-ground-platform-7] -> [color=orange]60%[/color]\n • [technology=warp-factory-platform-6] -> [color=orange]70%[/color]\n • [technology=warp-ground-platform-8] -> [color=orange]80%[/color]\n • [technology=warp-factory-platform-7] -> [color=orange]90%[/color]\n • [technology=warp-end-prepare] -> [color=red]100%[/color]\n\n[color=green]Tip:[/color] If you want to delay higher-tier enemies, postpone those researches until your base is ready.
warptorio-evolution-scaling=Эволюция врагов в Warptorio [font=default-bold]не зависит от времени или загрязнения[/font]. Она увеличивается по мере вашего прогресса в ключевых исследованиях платформы.\n\nКаждое выполненное ключевое исследование повышает эволюцию врагов до фиксированного значения:\n • [technology=warp-ground-platform-4] -> [color=orange]10%[/color]\n • [technology=warp-factory-platform-3] -> [color=orange]15%[/color]\n • [technology=warp-ground-platform-5] -> [color=orange]20%[/color]\n • [technology=warp-factory-platform-4] -> [color=orange]30%[/color]\n • [technology=warp-ground-platform-6] -> [color=orange]40%[/color]\n • [technology=warp-factory-platform-5] -> [color=orange]50%[/color]\n • [technology=warp-ground-platform-7] -> [color=orange]60%[/color]\n • [technology=warp-factory-platform-6] -> [color=orange]70%[/color]\n • [technology=warp-ground-platform-8] -> [color=orange]80%[/color]\n • [technology=warp-factory-platform-7] -> [color=orange]90%[/color]\n • [technology=warp-end-prepare] -> [color=red]100%[/color]\n\n[color=green]Совет:[/color] Если вы хотите отложить появление более сильных врагов, отложите эти исследования, пока ваша база не будет готова.
